<h3>投資建議（長/短期）</h3>

<div class="row mb-3">
    <div class="col-md-3">
        <select class="form-select" id="recScope">
            <option value="holding">僅持股</option>
            <option value="all">全市場（前 200 大成交量）</option>
        </select>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary" id="btnRecRefresh">產生建議</button>
    </div>
</div>

<div id="recMsg" class="mt-2"></div>
<div id="recLoading" class="text-center" style="display:none;"><div class="spinner-border text-primary"></div> 分析中...</div>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header text-success">長期投資候選</div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0"><thead class="table-dark"><tr><th>代號</th><th>名稱</th><th>理由</th></tr></thead>
                <tbody id="longTermBody"><tr><td colspan="3" class="text-center text-muted">請點「產生建議」</td></tr></tbody></table>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header text-warning">短期/波段候選</div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0"><thead class="table-dark"><tr><th>代號</th><th>名稱</th><th>理由</th></tr></thead>
                <tbody id="shortTermBody"><tr><td colspan="3" class="text-center text-muted">請點「產生建議」</td></tr></tbody></table>
            </div>
        </div>
    </div>
</div>
