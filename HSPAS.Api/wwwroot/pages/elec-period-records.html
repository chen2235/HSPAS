<div class="container-fluid">
    <h4 class="mb-3">每期電費紀錄</h4>
    <div id="elecMsg"></div>

    <!-- 上傳區塊 -->
    <div class="card mb-3">
        <div class="card-header">上傳台電電費 PDF</div>
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label">選擇 PDF 檔案</label>
                    <input type="file" id="elecPdfFile" class="form-control" accept=".pdf">
                </div>
                <div class="col-md-3">
                    <button id="btnUploadElec" class="btn btn-primary">
                        <span id="uploadSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
                        上傳並解析
                    </button>
                </div>
            </div>
            <small class="text-muted">密碼已內建，直接上傳即可。上傳後會顯示解析結果供您確認。</small>
        </div>
    </div>

    <!-- 解析結果確認區塊（上傳後顯示） -->
    <div class="card mb-3 d-none" id="confirmCard">
        <div class="card-header bg-warning-subtle">
            PDF 解析結果 — 請確認以下資料，修改後按「確認儲存」
        </div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-6">
                    <h6>計費資訊</h6>
                    <div class="row g-2">
                        <div class="col-6 mb-2"><label class="form-label">電價種類</label><input type="text" id="cfmTariffType" class="form-control"></div>
                        <div class="col-6 mb-2"><label class="form-label">分攤戶數</label><input type="number" id="cfmSharedCount" class="form-control"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <h6>計費資訊</h6>
                    <div class="row g-2">
                        <div class="col-6 mb-2"><label class="form-label">計費起始日</label><input type="date" id="cfmStartDate" class="form-control"></div>
                        <div class="col-6 mb-2"><label class="form-label">計費結束日</label><input type="date" id="cfmEndDate" class="form-control"></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6 mb-2"><label class="form-label">計費天數</label><input type="number" id="cfmDays" class="form-control"></div>
                        <div class="col-6 mb-2"><label class="form-label">抄表/扣款日</label><input type="date" id="cfmReadDate" class="form-control"></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-4 mb-2"><label class="form-label">計費度數</label><input type="number" id="cfmKwh" class="form-control"></div>
                        <div class="col-4 mb-2"><label class="form-label">日平均度數</label><input type="number" id="cfmKwhPerDay" class="form-control" step="0.01"></div>
                        <div class="col-4 mb-2"><label class="form-label">每度平均電價</label><input type="number" id="cfmAvgPrice" class="form-control" step="0.01"></div>
                    </div>
                </div>
            </div>
            <div class="row g-2">
                <div class="col-md-4">
                    <h6>金額</h6>
                    <div class="mb-2"><label class="form-label">繳費總金額</label><input type="number" id="cfmTotalAmount" class="form-control"></div>
                </div>
                <div class="col-md-4">
                    <h6>發票</h6>
                    <div class="mb-2"><label class="form-label">發票期別</label><input type="text" id="cfmInvPeriod" class="form-control"></div>
                    <div class="mb-2"><label class="form-label">發票號碼</label><input type="text" id="cfmInvNo" class="form-control"></div>
                </div>
                <div class="col-md-4">
                    <h6>電費明細</h6>
                    <div id="cfmDetailItems" class="small"></div>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label">備註 <small class="text-muted">(最多500字)</small></label>
                <textarea id="cfmRemark" class="form-control" rows="4" maxlength="500" placeholder="選填"></textarea>
                <small class="text-muted"><span id="cfmRemarkCount">0</span> / 500</small>
            </div>
            <input type="hidden" id="cfmRawDetailJson">
            <input type="hidden" id="cfmBillingPeriodText">
            <input type="hidden" id="cfmInvoiceAmount">
            <div class="mt-3 d-flex gap-2">
                <button id="btnConfirmSave" class="btn btn-success">確認儲存</button>
                <button id="btnCancelConfirm" class="btn btn-outline-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 固定資訊 -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="row">
                <div class="col-md-5"><strong>用電地址：</strong>新北市汐止區福山街60巷12號四樓</div>
                <div class="col-md-4"><strong>電號：</strong>16-36-6055-40-7</div>
                <div class="col-md-3"><strong>輪流停電組別：</strong>C</div>
            </div>
        </div>
    </div>

    <!-- 紀錄列表 -->
    <div class="card">
        <div class="card-header">電費紀錄列表 <span id="elecCount" class="badge bg-secondary ms-2">0</span></div>
        <div class="card-body table-responsive">
            <table class="table table-hover table-sm">
                <thead>
                    <tr>
                        <th>計費期間</th>
                        <th>抄表/扣款日</th>
                        <th class="text-end">計費度數</th>
                        <th class="text-end">日平均度數</th>
                        <th class="text-end">每度平均電價</th>
                        <th class="text-end">繳費總金額</th>
                        <th>發票期別</th>
                        <th>發票號碼</th>
                        <th>備註</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="elecBody">
                    <tr><td colspan="10" class="text-center text-muted">尚無資料</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 明細 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">電費帳單明細</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="detailContent"></div>
        </div>
    </div>
</div>

<!-- 修改 Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">修改電費紀錄</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-2"><label class="form-label">計費起始日</label><input type="date" id="editStartDate" class="form-control"></div>
                <div class="mb-2"><label class="form-label">計費結束日</label><input type="date" id="editEndDate" class="form-control"></div>
                <div class="mb-2"><label class="form-label">計費天數</label><input type="number" id="editDays" class="form-control"></div>
                <div class="mb-2"><label class="form-label">抄表/扣款日</label><input type="date" id="editReadDate" class="form-control"></div>
                <div class="mb-2"><label class="form-label">計費度數</label><input type="number" id="editKwh" class="form-control"></div>
                <div class="mb-2"><label class="form-label">日平均度數</label><input type="number" id="editKwhPerDay" class="form-control" step="0.01"></div>
                <div class="mb-2"><label class="form-label">每度平均電價</label><input type="number" id="editAvgPrice" class="form-control" step="0.01"></div>
                <div class="mb-2"><label class="form-label">繳費總金額</label><input type="number" id="editAmount" class="form-control"></div>
                <div class="mb-2"><label class="form-label">發票期別</label><input type="text" id="editInvPeriod" class="form-control"></div>
                <div class="mb-2"><label class="form-label">發票號碼</label><input type="text" id="editInvNo" class="form-control"></div>
                <div class="mb-2">
                    <label class="form-label">備註 <small class="text-muted">(最多500字)</small></label>
                    <textarea id="editRemark" class="form-control" rows="4" maxlength="500"></textarea>
                    <small class="text-muted"><span id="editRemarkCount">0</span> / 500</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" id="btnSaveEdit" class="btn btn-primary">儲存</button>
            </div>
        </div>
    </div>
</div>
