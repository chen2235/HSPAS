<h3>美股儀表板</h3>

<!-- 摘要卡片列 -->
<div class="row mb-4" id="usSummaryCards">
    <div class="col-md-3">
        <div class="card summary-card">
            <div class="card-body">
                <div class="text-muted small">總市值 (USD)</div>
                <div class="fs-4 fw-bold" id="usTotalMV">--</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card summary-card">
            <div class="card-body">
                <div class="text-muted small">總成本 (USD)</div>
                <div class="fs-4 fw-bold" id="usTotalCost">--</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card summary-card" id="usPnlCard">
            <div class="card-body">
                <div class="text-muted small">未實現損益 (USD)</div>
                <div class="fs-4 fw-bold" id="usTotalPnL">--</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card summary-card" id="usReturnCard">
            <div class="card-body">
                <div class="text-muted small">報酬率</div>
                <div class="fs-4 fw-bold" id="usTotalReturn">--</div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- 持股比例圓餅圖 -->
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">美股持股比例</div>
            <div class="card-body">
                <canvas id="usHoldingsChart" height="260"></canvas>
            </div>
        </div>
    </div>
    <!-- 持股明細 -->
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">持股明細</div>
            <div class="card-body p-0">
                <table class="table table-sm table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="sortable-usdash" data-col="stockSymbol" style="cursor:pointer">代號</th>
                            <th class="sortable-usdash" data-col="stockName" style="cursor:pointer">名稱</th>
                            <th class="sortable-usdash" data-col="quantity" style="cursor:pointer">股數</th>
                            <th class="sortable-usdash" data-col="lastPrice" style="cursor:pointer">現價</th>
                            <th class="sortable-usdash" data-col="marketValue" style="cursor:pointer">市值</th>
                            <th class="sortable-usdash" data-col="weightRatio" style="cursor:pointer">比例</th>
                        </tr>
                    </thead>
                    <tbody id="usDashHoldingsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 最近交易紀錄 -->
<div class="card mb-4">
    <div class="card-header"><i class="bi bi-clock-history"></i> 最近交易紀錄</div>
    <div class="card-body p-0">
        <table class="table table-sm table-striped mb-0">
            <thead class="table-dark">
                <tr>
                    <th>日期</th>
                    <th>代號</th>
                    <th>名稱</th>
                    <th>動作</th>
                    <th>股數</th>
                    <th>價格(USD)</th>
                    <th>應收付額(USD)</th>
                </tr>
            </thead>
            <tbody id="usRecentBody"><tr><td colspan="7" class="text-center text-muted">載入中...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="usDashMsg" class="text-center" style="display:none;">
    <div class="spinner-border text-primary"></div> 載入中...
</div>
